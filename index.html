<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HWDE Tracker — KB v2.7</title>
<style>
:root{
  --bg:#0c111d;--panel:#131929;--cell:#1a2438;--cell-h:#243050;
  --border:#2a3550;--text:#ddd8c0;--dim:#6a7488;--gold:#d4a020;
  --light:#f5c842;--dark:#9b5de5;--fire:#e85c2a;--water:#2ea8e8;--lightning:#d4c400;
  --yes:#44cc66;--no:#cc4444;--unk:#888;
  --d0:#102818;--d1:#162e18;--d2:#1e2c10;--d3:#2a2808;--d4:#2a1e08;--d5:#2a1208;--d6:#280a0a;
  --hc:#cc2222;--poh:#dd5588;--card:#3a66bb;--wpn:#c89a20;--cos:#1a9975;
  --search:#1a2830;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px 0;flex-shrink:0}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr h1{font-size:17px;font-weight:700;color:var(--gold)}
.badge{font-size:10px;background:#1a3020;color:#66cc88;border:1px solid #336644;border-radius:3px;padding:1px 5px}
.ver{font-size:11px;color:var(--dim)}
.save-ind{font-size:10px;color:var(--yes);margin-left:auto;opacity:0;transition:opacity .4s}
.save-ind.show{opacity:1}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 11px;cursor:pointer;border-radius:3px 3px 0 0;background:var(--cell);border:1px solid var(--border);border-bottom:none;font-size:11px;color:var(--dim);white-space:nowrap;user-select:none}
.tab:hover{background:var(--cell-h);color:var(--text)}
.tab.active{background:var(--bg);color:var(--gold)}
main{flex:1;overflow:hidden}
.grid-area{width:100%;height:100%;overflow:auto;padding:10px}
.grid-info{font-size:11px;color:var(--dim);margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap}
.grid-info b{color:var(--text)}
.gi-f{color:var(--light)}.gi-fd{color:#88aacc}.gi-sk{color:#aaa}
.map-grid{display:grid;gap:2px}
.cell{width:40px;height:48px;border:1px solid var(--border);border-radius:3px;cursor:pointer;touch-action:manipulation;position:relative;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:1px;padding:1px;overflow:hidden;transition:border-color .1s,transform .08s}
.cell:hover{border-color:var(--gold)!important;transform:scale(1.08);z-index:2}
.cell.empty{background:var(--cell)!important;opacity:.13;cursor:default;pointer-events:none}
.cell.selected{border-color:var(--gold)!important;box-shadow:0 0 0 1px var(--gold)}
.cell.all-done{opacity:.45}
.c-coord{font-size:8px;color:rgba(200,200,200,.32);font-family:monospace;position:absolute;top:1px;left:2px;pointer-events:none}
.mrow{display:flex;gap:1px;align-items:center;justify-content:center;pointer-events:none}
.mk{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.4);flex-shrink:0}
.mk-sq{border-radius:2px}
.mk-glow{box-shadow:0 0 4px currentColor}
.sk{font-size:8px;line-height:1;letter-spacing:-1px}
.ico{width:6px;height:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.35)}
.ico-c{border-radius:50%}.ico-s{border-radius:2px}
/* Modal */
.overlay{position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(5,8,20,.88);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .18s}
.overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  width:420px;max-width:calc(100vw - 32px);max-height:calc(100vh - 40px);
  overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:11px;
  position:relative;transform:translateY(10px) scale(.97);transition:transform .18s;
  box-shadow:0 8px 40px rgba(0,0,0,.65)}
.overlay.open .modal{transform:none}
.modal-x{position:absolute;top:9px;right:11px;background:none;border:none;
  color:var(--dim);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:3px;line-height:1}
.modal-x:hover{color:var(--text);background:var(--cell-h)}
.overlay{cursor:pointer}.modal{cursor:default}
/* Detail */
.d-coord{font-size:15px;font-family:monospace;color:var(--gold);font-weight:700}
.d-map{font-size:11px;color:var(--dim);margin-top:1px}
.diff-bar{display:flex;gap:3px;align-items:center;margin-top:5px}
.diff-pip{width:10px;height:10px;border-radius:2px}
.diff-lbl{font-size:10px;color:var(--dim);margin-left:5px}
.mission-box{font-size:12px;line-height:1.5;padding:9px 10px;background:#0d1628;border-radius:5px;border-left:3px solid var(--gold)}
.rule-badge{display:inline-block;font-size:10px;background:#2a1a00;color:#c48020;border:1px solid #6a4010;border-radius:3px;padding:1px 6px;margin-top:4px}
.sec{display:flex;flex-direction:column;gap:4px}
.sec-t{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);border-bottom:1px solid var(--border);padding-bottom:3px}
.arank{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:11px;background:#0d1628;border:1px solid var(--border);border-radius:3px;padding:2px 7px}
.chip b{color:var(--gold)}
/* Search section */
.search-sec{background:var(--search);border:1px solid #243848;border-radius:5px;padding:9px;display:flex;flex-direction:column;gap:7px}
.search-t{font-size:10px;color:#5090b0;text-transform:uppercase;letter-spacing:.5px}
.search-img{width:100%;border-radius:3px;border:1px solid var(--border);image-rendering:pixelated;image-rendering:crisp-edges}
.search-item{display:flex;align-items:center;gap:7px;font-size:12px;line-height:1.4}.search-item.done .search-desc{opacity:.4;text-decoration:line-through}
.card-badge{font-size:10px;background:#1a3040;color:#6ab0cc;border:1px solid #2a4a60;border-radius:3px;padding:1px 6px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.search-none{font-size:11px;color:var(--dim);font-style:italic}
.bosskey-row{font-size:11px;color:#c49020;display:flex;align-items:center;gap:5px}
/* Reward rows */
.rew-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0}
.rew-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;border:1px solid rgba(0,0,0,.3)}
.rew-sq{border-radius:2px}
.rew-body{flex:1;display:flex;flex-direction:column;gap:3px}
.rew-text{font-size:12px;line-height:1.35}
.rew-text.done{text-decoration:line-through;color:var(--dim);opacity:.55}
.rew-loc{font-size:10px;color:var(--dim)}
.rew-cond{font-size:10px;color:#7a9ab0;margin-top:1px}
/* Skull box */
.skull-box{background:#0d1a0d;border:1px solid #1a3020;border-radius:4px;padding:8px;display:flex;flex-direction:column;gap:5px}
.skull-box-t{font-size:10px;color:#50a060;text-transform:uppercase;letter-spacing:.6px}
.skull-warn{font-size:10px;color:#c48020;background:#1a1200;border:1px solid #4a3000;border-radius:3px;padding:3px 7px;display:flex;gap:4px;align-items:flex-start}
/* Toggle */
.tog{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid;cursor:pointer;
      display:inline-flex;align-items:center;gap:3px;font-family:inherit;align-self:flex-start}
.tog:hover{filter:brightness(1.2)}
.tog.yes-s{background:#1a3020;color:var(--yes);border-color:#336644}
.tog.no-s{background:#2a1010;color:var(--no);border-color:#664433}
.tog.unk-s{background:#1c1c1c;color:var(--unk);border-color:#333}
.tog.lg{font-size:11px;padding:3px 9px}
.snote{font-size:11px;color:#7899aa;background:#0a1520;border:1px solid #1a2e40;border-radius:3px;padding:5px 7px;display:flex;gap:5px;margin-top:2px}
/* KB */
.kb-sec{background:#0d1a22;border:1px solid #1a3040;border-radius:5px;padding:9px;display:flex;flex-direction:column;gap:6px}
.kb-t{font-size:10px;color:#5090b0;text-transform:uppercase;letter-spacing:.5px}
.eb{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:1px 7px;border-radius:10px;border:1px solid currentColor;font-weight:600}
.ed{width:6px;height:6px;border-radius:50%;background:currentColor}
.st-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.note{font-size:11px;color:var(--dim);font-style:italic;line-height:1.35}
.warn{color:#c48020;font-style:normal}
.src-line{font-size:10px;color:var(--dim);border-top:1px solid var(--border);padding-top:6px}
/* Legend */
.legend{flex-shrink:0;display:flex;flex-wrap:wrap;gap:7px;padding:6px 14px;background:var(--panel);border-top:1px solid var(--border);font-size:11px}
.li{display:flex;align-items:center;gap:3px;color:var(--dim)}
.ld{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,.15)}
.ld-sq{border-radius:2px}
.sep{color:var(--border);margin:0 3px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.portal-badge{
  display:block;
  background:rgba(140,60,200,0.9);
  color:#fff;font-size:8px;font-weight:bold;
  border-radius:2px;padding:0 2px;
  line-height:12px;cursor:default;
  border:1px solid rgba(220,160,255,0.6);
  text-align:center;width:100%;box-sizing:border-box;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
</style>

const LS='hwde_kb_v2';
let S=(()=>{try{return JSON.parse(localStorage.getItem(LS))||{};}catch(e){return{};}})();
if(!S.foods)S.foods={};if(!S.fairies)S.fairies={};if(!S.rewards)S.rewards={};if(!S.searches)S.searches={};
function save(){
  try{localStorage.setItem(LS,JSON.stringify(S));
    const i=document.getElementById('saveInd');i.classList.add('show');
    clearTimeout(i._t);i._t=setTimeout(()=>i.classList.remove('show'),1800);}catch(e){}
}
function fv(fn,f){return S.foods[fn]?.[f]!==undefined?S.foods[fn][f]:(KB.kb_foods[fn]?.[f]??null);}
function yv(k,f){return S.fairies[k]?.[f]!==undefined?S.fairies[k][f]:(KB.kb_fairies[k]?.[f]??null);}
function togFood(fn,f){if(!S.foods[fn])S.foods[fn]={};S.foods[fn][f]=!fv(fn,f);save();rerender();}
function togFairy(k,f){if(!S.fairies[k])S.fairies[k]={};S.fairies[k][f]=!yv(k,f);save();rerender();}
function sv(mn,coord,card){return S.searches[mn+'|'+coord+'|'+card]===true;}
function togSearch(mn,coord,card){const k=mn+'|'+coord+'|'+card;if(!S.searches)S.searches={};S.searches[k]=!S.searches[k];save();rerender();}
function searchDone(mn,coord){const gk=coord[0]+'-'+coord.slice(1);const gd=GUIDE[mn]?GUIDE[mn][gk]:null;if(!gd||!gd.search||gd.search.length===0)return true;return gd.search.every(item=>sv(mn,coord,item.card));}
function rv(mn,coord,field){return S.rewards[mn+'|'+coord+'|'+field]===true;}
function togRew(mn,coord,field){const k=mn+'|'+coord+'|'+field;S.rewards[k]=!S.rewards[k];save();rerender();}
function rerender(){
  if(window._dm&&window._dc){const t=MAPS_RAW[window._dm]?.[window._dc];if(t)document.getElementById('modalContent').innerHTML=buildDetail(window._dm,window._dc,t);}
  refreshCell(window._dm,window._dc);
}

const ICO={
  hc:{bg:'var(--hc)',cls:'ico-c',dot:'rew-dot',title:'Réceptacle de Cœur'},
  poh:{bg:'var(--poh)',cls:'ico-c',dot:'rew-dot',title:'Fragment de Cœur'},
  card:{bg:'var(--card)',cls:'ico-s',dot:'rew-dot rew-sq',title:'Carte-Objet'},
  wpn:{bg:'var(--wpn)',cls:'ico-c',dot:'rew-dot',title:'Arme / Grande Fée'},
  cos:{bg:'var(--cos)',cls:'ico-s',dot:'rew-dot rew-sq',title:'Tenue fée'},
  srch:{bg:'#2a6a4a',cls:'ico-s',dot:'rew-dot rew-sq',title:'Recherche à compléter'},
};
function lootIco(text){
  if(!text)return null;
  if(text.includes('Heart Container'))return'hc';
  if(text.includes('Piece of Heart'))return'poh';
  if(/Item Card/.test(text))return'card';
  if(/Lv\.\d/.test(text))return'wpn';
  if(/Fairy (Top|Bottom|Bottoms|Headwear|Accessory|Decoration)/.test(text))return'cos';
  return null;
}
function tileRewards(t){
  const items=[];
  if(t.la)items.push({field:'la',text:t.la,ico:lootIco(t.la),label:'A'});
  if(t.lv)t.lv.split(' · ').forEach((txt,i)=>{if(txt.trim())items.push({field:`lv_${i}`,text:txt.trim(),ico:lootIco(txt),label:'V'});});
  (t.t||[]).forEach((txt,i)=>{if(txt)items.push({field:`t_${i}`,text:txt,ico:lootIco(txt),label:''});});
  if(t.s)items.push({field:'skull_1',text:'skull_1',ico:null,label:''});
  if(t.s)items.push({field:'skull_2',text:'skull_2',ico:null,label:''});
  return items;
}
function activeIcons(t,mn,coord){
  const byType={};
  tileRewards(t).filter(r=>r.ico).forEach(item=>(byType[item.ico]||(byType[item.ico]=[])).push(item));
  const _icos=Object.entries(byType).filter(([ic,items])=>!items.every(it=>rv(mn,coord,it.field))).map(([ic])=>ic);
  const gk2=coord[0]+'-'+coord.slice(1);const gd2=GUIDE[mn]?GUIDE[mn][gk2]:null;
  if(gd2&&gd2.search&&gd2.search.length>0&&!searchDone(mn,coord))_icos.push('srch');
  return _icos;
}
function skullRemaining(t,mn,coord){
  if(!t.s)return 0;
  return(rv(mn,coord,'skull_1')?0:1)+(rv(mn,coord,'skull_2')?0:1);
}
function cellDone(t,mn,coord){
  const rews=tileRewards(t);
  return rews.length>0&&rews.every(r=>rv(mn,coord,r.field))
    &&(!t.ff||t.ff.every(f=>fv(f.name,'unlocked')===true))
    &&(!t.f||yv(mn+'|'+coord,'confirmed')===true);
}
function icoRow(icons,skullCount){
  const dots=icons.map(ic=>`<div class="ico ${ICO[ic].cls}" style="background:${ICO[ic].bg}" title="${ICO[ic].title}"></div>`).join('');
  const sk=skullCount===2?'<span class="sk">💀💀</span>':skullCount===1?'<span class="sk">💀</span>':'';
  return(dots||sk)?`<div class="mrow">${dots}${sk}</div>`:'';
}

function cellWalls(mapName,coord){
  const dims=MAP_DIMS[mapName];if(!dims)return null;
  const letters=dims.rows,col=coord[0],row=parseInt(coord.slice(1));
  const ci=letters.indexOf(col);if(ci<0)return null;
  const sh=[];
  // Alias : Master maps partagent les murs de leur map de base
  const aliasMap=(typeof MAP_ALIASES!=='undefined'&&MAP_ALIASES[mapName])||mapName;
  function sides(set,C){
    if(!set||!set.size)return;
    if(ci<letters.length-1&&set.has(col+row+'>'+letters[ci+1]+row))sh.push('inset -4px 0 0 0 '+C);
    if(ci>0&&set.has(letters[ci-1]+row+'>'+col+row))sh.push('inset 4px 0 0 0 '+C);
    if(set.has(col+row+'>'+col+(row+1)))sh.push('inset 0 -4px 0 0 '+C);
    if(row>1&&set.has(col+(row-1)+'>'+col+row))sh.push('inset 0 4px 0 0 '+C);
  }
  sides(MAP_WALLS[aliasMap],'#ff6600');                                          // murs confirmés (orange)
  sides(typeof MAP_WINDS!=='undefined'?MAP_WINDS[mapName]:null,'#44ccff');       // nuages confirmés (bleu)
  sides(typeof MAP_UNCONFIRMED!=='undefined'?MAP_UNCONFIRMED[mapName]:null,'#ffee44'); // incertains (jaune)
  return sh.length?sh.join(','):null;
}

  if(guideData) {
    const searchItems = guideData.search || [];
    const imgKey=coord[0]+'-'+coord.slice(1);const _folder=MAP_FOLDERS[mn2]||'adventure';const img=CELL_IMAGES[imgKey]||('./images/'+_folder+'/'+imgKey+'.png');
    h+=`<div class="search-sec">
      <div class="search-t">🔍 Recherche dans la case</div>`;
    if(img) h+=`<img src="${img}" class="search-img" alt="Carte de recherche ${coord}">`;
    if(searchItems.length===0){
      h+=`<div class="search-none">Pas de recherche requise pour cette case.</div>`;
    } else {
      searchItems.forEach((item,si)=>{
        const desc=tSearch(item.desc);
        const done=sv(mn2,coord,item.card);
        const safeMn=mn2.replace(/'/g,"\\'");
        const safeCard=(item.card||'').replace(/'/g,"\\'");
        const _ico=CARD_ICONS[item.card]?`<img src="${CARD_ICONS[item.card]}" style="width:20px;height:20px;image-rendering:pixelated;flex-shrink:0;border-radius:2px" />`:'';        const tgFn=`togSearch('${safeMn}','${coord}','${safeCard}')`;
        h+=`<div class="search-item${done?' done':''}">${_ico}<span class="card-badge">${item.card_fr||item.card}</span><span class="search-desc" style="flex:1">${desc}</span>${togBtn(done,'Fait','À faire',tgFn)}</div>`;
      });
    }
    if(guideData.boss_key){
      h+=`<div class="bosskey-row">🗝 <b>Clé de Boss :</b> ${tKeep(guideData.boss_key)}</div>`;
    }
    h+=`</div>`;
  }

  /* ── Récompenses ── */
  const rews=tileRewards(t).filter(r=>r.field!=='skull_1'&&r.field!=='skull_2');
  const skullTotal=t.s?2:0;
  const skullDone=(rv(mn2,coord,'skull_1')?1:0)+(rv(mn2,coord,'skull_2')?1:0);
  const totalAll=rews.length+skullTotal;
  const doneAll=rews.filter(r=>rv(mn2,coord,r.field)).length+skullDone;

  if(totalAll>0){
    h+=`<div class="sec">
      <div class="sec-t" style="display:flex;justify-content:space-between;align-items:center">
        <span>Récompenses</span>
        <span style="font-size:10px;color:${doneAll===totalAll?'var(--yes)':'var(--dim)'}">${doneAll}/${totalAll}</span>
      </div>`;
    if(t.la)h+=rewRow(mn2,coord,'la',t.la,'A');
    if(t.lv)t.lv.split(' · ').forEach((txt,i)=>{if(txt.trim())h+=rewRow(mn2,coord,`lv_${i}`,txt.trim(),'V');});
    if(t.t?.length){
      h+=`<div style="font-size:10px;color:var(--dim);margin-top:4px;margin-bottom:1px">Trésors (dans la case)</div>`;
      t.t.forEach((txt,i)=>h+=rewRow(mn2,coord,`t_${i}`,txt,''));
    }
    h+=`</div>`;
  }

  /* ── Skulltulas ── */
  if(t.s){
    const s1=rv(mn2,coord,'skull_1'),s2=rv(mn2,coord,'skull_2');
    const skull1txt = guideData?.skull_1 ? tSkull(guideData.skull_1) : '1\u00a0000 KO';
    const skull2txt = guideData?.skull_2 ? tSkull(guideData.skull_2) : 'Complétez la mission · capturez des forts · ≤40% PV perdus';
    const safeMn=mn2.replace(/'/g,"\\'");
    h+=`<div class="skull-box">
      <div class="skull-box-t">💀 Skulltulas d'Or</div>
      <div class="skull-warn"><span>⚠️</span><span>2 runs séparés — impossible d'obtenir les deux lors du même run.</span></div>
      <div class="rew-row">
        <div style="font-size:13px;flex-shrink:0;margin-top:1px">💀</div>
        <div class="rew-body">
          <div class="rew-text${s1?' done':''}">Skulltula n°1</div>
          <div class="rew-cond">${skull1txt}</div>
          ${togBtn(s1,'Obtenue','Non obtenue',`togRew('${safeMn}','${coord}','skull_1')`,false)}
        </div>
      </div>
      <div class="rew-row">
        <div style="font-size:13px;flex-shrink:0;margin-top:1px;opacity:.65">💀</div>
        <div class="rew-body">
          <div class="rew-text${s2?' done':''}">Skulltula n°2</div>
          <div class="rew-cond">${skull2txt}</div>
          ${togBtn(s2,'Obtenue','Non obtenue',`togRew('${safeMn}','${coord}','skull_2')`,false)}
          ${!s1&&!s2?`<div class="note" style="margin-top:2px">Obtenir la n°1 en premier.</div>`:''}
        </div>
      </div>
      <div class="skull-warn" style="color:#8899aa;border-color:#1a2e40;background:#0a1520;margin-top:2px">
        <span>🎮</span><span><b>Menu Pause → Infos guerrier → Skulltulas dorées</b> pour les conditions exactes.</span>
      </div>
    </div>`;
  }

  /* ── KB : Fée ── */
  if(t.f){
    const kbf=KB.kb_fairies[key],conf=yv(key,'confirmed');
    h+=`<div class="kb-sec">
      <div class="kb-t">🧚 Fée de Compagnie</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${eb(t.f.element)}${kbf?.name?`<span style="color:var(--gold);font-weight:700">${kbf.name}</span>`:''}
      </div>
      <div style="font-size:10px;color:var(--dim)">Emplacement : ${tKeep(t.f.location)||'?'}</div>
      <div class="st-row">${togBtn(conf,'Confirmé DE','Non confirmé',`togFairy('${key}','confirmed')`,true)}</div>
      ${!kbf?'<div class="note warn">⚠️ Source SBAllen 3DS — à confirmer en DE</div>':''}
    </div>`;
  }

  /* ── KB : Nourritures ── */
  (t.ff||[]).forEach(food=>{
    if(!food.name||food.name==='—')return;
    const kf=KB.kb_foods[food.name];
    const unl=fv(food.name,'unlocked'),conf=fv(food.name,'confirmed');
    const safeName=food.name.replace(/'/g,"\\'");
    h+=`<div class="kb-sec">
      <div class="kb-t">🍄 Nourriture fée</div>
      <div style="font-size:13px;font-weight:600">${kf?.fr||food.name}</div>
      <div style="font-size:11px;color:var(--dim)">${food.name}${kf?.id?' · '+kf.id:''}</div>
      ${kf?.element?`<div>${eb(kf.element)}</div>`:''}
      <div style="font-size:10px;color:var(--dim)">Emplacement : ${tKeep(food.location)||'?'}</div>
      <div class="st-row">
        ${togBtn(unl,'Obtenu','Non obtenu',`togFood('${safeName}','unlocked')`,true)}
        ${togBtn(conf,'Élément confirmé','Non confirmé',`togFood('${safeName}','confirmed')`,true)}
      </div>
      ${food.name==='Chateau Romani'?'<div class="note warn">⚠️ Nom FR DE inconnu · Ténèbres (conflit_006 résolu)</div>':''}
      ${(food.name==='Scent Seeds'||food.name==='Mystery Seeds')?'<div class="note warn">⚠️ P11/P14 : anomalie inversée — à vérifier</div>':''}
      ${(!conf&&food.name!=='Chateau Romani'&&food.name!=='Scent Seeds'&&food.name!=='Mystery Seeds')?'<div class="note">Source SBAllen 3DS — élément non confirmé en DE</div>':''}
    </div>`;
  });

  h+=`<div class="src-line">
    ${guideData?'<span style="color:#50a060">✓ SBAllen GameFAQs (3DS)</span> · ':''}
    <a href="https://metrowind.github.io/hyrule-warriors-maps/maps.html" target="_blank" style="color:#5090b0">↗ MetroWind</a>
    · ⚠️ coordonnées 3DS à vérifier en DE</div>`;
  return h;
}

renderAll();
</script>

</body></html>
